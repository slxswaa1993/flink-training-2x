# Flink Cluster Infrastructure
# This is your reusable Flink cluster - no jobs embedded

services:
  jobmanager:
    image: flink:1.20-java17
    container_name: flink-jobmanager
    ports:
      - "8082:8081"  # Flink Web UI
      - "6123:6123"  # RPC port (for CLI submission)
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        rest.address: 0.0.0.0
    volumes:
      - ./jars:/opt/flink/usrlib
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 5s
      timeout: 3s
      retries: 10

  taskmanager:
    image: flink:1.20-java17
    container_name: flink-taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - ./jars:/opt/flink/usrlib
