name: Deploy Application

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: prodeus2ordersacr
  AKS_CLUSTER: prod-eus2-orders-aks
  AKS_RESOURCE_GROUP: prod-eus2-orders-rg

jobs:
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Inject Azure Storage key into Hadoop ConfigMaps
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --account-name prodeus2ordersstorage \
            --resource-group $AKS_RESOURCE_GROUP \
            --query '[0].value' -o tsv)

          for CM_NAME in hadoop-config hadoop-config-sql-dashboard; do
            kubectl create configmap $CM_NAME -n flink \
              --from-literal=core-site.xml="<?xml version=\"1.0\"?>
          <configuration>
            <property>
              <name>fs.azure.account.key.prodeus2ordersstorage.dfs.core.windows.net</name>
              <value>${STORAGE_KEY}</value>
            </property>
          </configuration>" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Apply Kustomize base
        run: kubectl apply -k k8s/overlays/production --server-side --force-conflicts

      - name: Patch image tags
        run: |
          SERVICES=(order-generator dashboard-backend dashboard-frontend)
          for SVC in "${SERVICES[@]}"; do
            kubectl set image deployment/$SVC \
              $SVC=${{ env.ACR_NAME }}.azurecr.io/$SVC:${{ steps.tag.outputs.tag }} \
              -n orders
          done

      - name: Patch Flink job image and storage key
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --account-name prodeus2ordersstorage \
            --resource-group $AKS_RESOURCE_GROUP \
            --query '[0].value' -o tsv)

          kubectl patch flinkdeployment sql-dashboard -n flink \
            --type='json' \
            -p='[
              {"op":"replace","path":"/spec/image","value":"${{ env.ACR_NAME }}.azurecr.io/flink-sql-dashboard:${{ steps.tag.outputs.tag }}"},
              {"op":"add","path":"/spec/flinkConfiguration/fs.azure.account.key.prodeus2ordersstorage.dfs.core.windows.net","value":"'"${STORAGE_KEY}"'"}
            ]'

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/dashboard-backend -n orders --timeout=300s
          kubectl rollout status deployment/dashboard-frontend -n orders --timeout=300s
          kubectl rollout status deployment/order-generator -n orders --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Pods in orders namespace ==="
          kubectl get pods -n orders
          echo "=== Flink deployment ==="
          kubectl get flinkdeployment -n flink
