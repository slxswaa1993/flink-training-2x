name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: prodeus2ordersacr

jobs:
  build-matrix:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: order-generator
            context: services/order-generator
            dockerfile: infra/docker/order-generator/Dockerfile
            image: order-generator
          - service: dashboard-backend
            context: services/dashboard-backend
            dockerfile: infra/docker/dashboard-backend/Dockerfile
            image: dashboard-backend
          - service: dashboard-frontend
            context: services/dashboard-frontend
            dockerfile: infra/docker/dashboard-frontend/Dockerfile
            image: dashboard-frontend
          - service: flink-sql-dashboard
            context: sql-dashboard
            dockerfile: infra/docker/flink-job/Dockerfile
            image: flink-sql-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Set image tags
        id: tags
        run: |
          SHA_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:${{ github.sha }}"
          LATEST_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:latest"
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:cache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:cache,mode=max
