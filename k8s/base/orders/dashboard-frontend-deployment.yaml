apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: orders
  labels:
    app: dashboard-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      nodeSelector:
        pool: app
      containers:
        - name: dashboard-frontend
          image: REGISTRY/dashboard-frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
