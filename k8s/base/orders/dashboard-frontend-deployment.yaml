apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: orders
  labels:
    app: dashboard-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      nodeSelector:
        pool: app
      containers:
        - name: dashboard-frontend
          image: REGISTRY/dashboard-frontend:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.orders.example.com"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.orders.example.com"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
