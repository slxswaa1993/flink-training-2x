apiVersion: v1
kind: Service
metadata:
  name: order-generator
  namespace: orders
spec:
  selector:
    app: order-generator
  ports:
    - port: 8000
      targetPort: 8000
      name: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: orders
spec:
  selector:
    app: dashboard-backend
  ports:
    - port: 80
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: orders
spec:
  selector:
    app: dashboard-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: orders
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  clusterIP: None  # Headless for StatefulSet
