apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: eventhub-secrets-provider
  namespace: orders
spec:
  provider: azure
  secretObjects:
    - secretName: eventhub-secrets
      type: Opaque
      data:
        - objectName: eventhub-conn-string
          key: connection-string
        - objectName: eventhub-namespace
          key: namespace
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""
    keyvaultName: "prod-eus2-orders-kv"
    objects: |
      array:
        - |
          objectName: eventhub-conn-string
          objectType: secret
        - |
          objectName: eventhub-namespace
          objectType: secret
    tenantId: ""  # Populated by Terraform output
