apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: orders-dashboard-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: flink-job
      interval: 30s
      rules:
        - alert: FlinkJobNotRunning
          expr: |
            flink_jobmanager_job_uptime == 0 or absent(flink_jobmanager_job_uptime)
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Flink job is not running"
            description: "The SQL Dashboard Flink job has not been in RUNNING state for 2 minutes."

        - alert: FlinkCheckpointFailing
          expr: |
            rate(flink_jobmanager_job_numberOfFailedCheckpoints[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Flink checkpoints are failing"
            description: "Flink job checkpoint failure rate is above 0 for 5 minutes."

        - alert: KafkaConsumerLag
          expr: |
            kafka_consumergroup_lag > 5000
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Kafka consumer lag is high"
            description: "Consumer group lag exceeds 5000 messages for 3 minutes."

    - name: backend
      rules:
        - alert: BackendHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(http_request_duration_seconds_bucket{job="dashboard-backend"}[5m])
            ) > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Dashboard backend p99 latency is high"
            description: "p99 response time exceeds 500ms."

    - name: infrastructure
      rules:
        - alert: NodeCPUHigh
          expr: |
            100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node CPU usage is high"
            description: "Node {{ $labels.node }} CPU usage is above 85%."
